name: Build & Release

# 按 DuckDB 官方构建方案(manylinux_2_28 容器: gcc-toolset / glibc 2.28)在
# linux_amd64 与 linux_arm64 两个平台上, 分别为 openGauss 与 GaussDB 两种 libpq
# 构建可分发压缩包。产物名带上目标 DuckDB 版本, 形如:
#   opengauss_scanner-<variant>-<platform>-<duckdb_version>.zip
#   例: opengauss_scanner-gaussdb-linux_amd64-v1.5.4.zip
# 要编译哪些 DuckDB 版本由仓库根的 duckdb_versions.json 决定(唯一事实源)。
# 并在 linux_amd64 与 linux_arm64 上用 openGauss docker 做加载/连接冒烟测试; 打 tag(v*) 时发 Release。
#
# 触发方式(不在普通 push/PR 上自动构建, 完全手动控制何时编译):
#   - workflow_dispatch: 手动选 all(清单全部) / default(清单默认版) / 指定版本
#   - push tag v*:        发布, 构建清单里全部版本并挂到 Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      duckdb_version:
        description: "构建哪个 DuckDB 版本(需已在 duckdb_versions.json 登记)"
        type: choice
        default: all
        options:
          - all
          - default
          - v1.5.4
          - v1.5.3
          - v1.4.5

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 解析要构建的 DuckDB 版本清单(唯一事实源: 仓库根 duckdb_versions.json)。
  # 输出 matrix=[{version, postgres_ref}, ...] 供 build/test 做动态 matrix。
  #   - 手动触发: 按 inputs.duckdb_version (all / default / 指定版本)
  #   - 打 tag 发布: inputs 为空 → 视为 all, 构建全部登记版本
  # ---------------------------------------------------------------------------
  prepare:
    name: prepare (resolve duckdb versions)
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1
      - name: Resolve versions from duckdb_versions.json
        id: resolve
        env:
          SEL: ${{ github.event.inputs.duckdb_version || 'all' }}
        run: |
          set -eu
          python3 - "$SEL" <<'PY' >> "$GITHUB_OUTPUT"
          import json, sys
          sel = sys.argv[1] if len(sys.argv) > 1 else "all"
          with open("duckdb_versions.json") as f:
              m = json.load(f)
          versions, default = m["versions"], m["default"]
          if sel == "all":
              picked = list(versions.keys())
          elif sel == "default":
              picked = [default]
          elif sel in versions:
              picked = [sel]
          else:
              sys.exit(f"未知 DuckDB 版本 '{sel}': 请先在 duckdb_versions.json 登记")
          arr = [{"version": v, "postgres_ref": versions[v]} for v in picked]
          print("matrix=" + json.dumps(arr))
          PY
          echo "resolved: $(tail -n1 "$GITHUB_OUTPUT")"

  # ---------------------------------------------------------------------------
  # 构建: (清单版本数) × 2 variant × 2 platform 个产物
  # ---------------------------------------------------------------------------
  build:
    name: build-${{ matrix.dv.version }}-${{ matrix.variant }}-${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        dv: ${{ fromJSON(needs.prepare.outputs.matrix) }}
        variant: [opengauss, gaussdb]
        platform: [linux_amd64, linux_arm64]
        include:
          - platform: linux_amd64
            runner: ubuntu-latest
            image: quay.io/pypa/manylinux_2_28_x86_64
            gauss_arch: X86_64
            og_url: https://opengauss.obs.cn-south-1.myhuaweicloud.com/6.0.5/openEuler20.03/x86/openGauss-Libpq-6.0.5-openEuler20.03-x86_64.tar.gz
          - platform: linux_arm64
            runner: ubuntu-24.04-arm
            image: quay.io/pypa/manylinux_2_28_aarch64
            gauss_arch: arm_64
            og_url: https://opengauss.obs.cn-south-1.myhuaweicloud.com/6.0.5/openEuler20.03/arm/openGauss-Libpq-6.0.5-openEuler20.03-aarch64.tar.gz
    steps:
      # manylinux_2_28 = AlmaLinux 8(dnf), 默认 gcc = gcc-toolset(GCC 14), glibc 2.28。
      # 只需补齐 cmake/ninja/openssl 头文件/下载与打包工具; 编译器已就位。
      - name: Prepare toolchain (in manylinux container)
        run: |
          set -eux
          dnf install -y openssl-devel ninja-build cmake git python3 wget unzip zip findutils tar
          # extension-ci-tools 用 -G Ninja, cmake 找 ninja 可执行名; AlmaLinux 提供 ninja-build
          ln -sf "$(command -v ninja-build)" /usr/local/bin/ninja
          # 允许 git 操作被 root 挂载进来的工作区(避免 dubious ownership)
          git config --global --add safe.directory '*'
          gcc --version
          cmake --version
          ninja --version

      - name: Checkout (recursive submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # 官方口径切换: 把 duckdb-postgres 切到清单登记的 postgres_scanner 官方 pin,
      # 再把嵌套 duckdb 强制 checkout 到目标版本(等价官方 set_duckdb_version) ——
      # "指定 DuckDB 版本号" 即由此决定实际编译哪个 DuckDB, 对分支已删的 EOL 版本亦可。
      - name: Select DuckDB version → ${{ matrix.dv.version }}
        run: |
          set -eux
          bash scripts/select_duckdb.sh "${{ matrix.dv.version }}" "${{ matrix.dv.postgres_ref }}"

      # -----------------------------------------------------------------------
      # 准备 libpq: openGauss 用官方预编译包; GaussDB 用华为驱动包里的 Kylin 版
      # -----------------------------------------------------------------------
      - name: Prepare openGauss libpq
        if: matrix.variant == 'opengauss'
        env:
          OG_URL: ${{ matrix.og_url }}
        run: |
          set -eux
          rm -rf libpq && mkdir -p libpq
          wget -q -O og-libpq.tar.gz "$OG_URL"
          # 官方包顶层多一层目录, strip 掉后即为 libpq/{include,lib}
          tar -xzf og-libpq.tar.gz -C libpq --strip-components=1
          test -f libpq/include/libpq-fe.h
          ls libpq/lib/libpq.so*

      - name: Prepare GaussDB libpq (Kylin only)
        if: matrix.variant == 'gaussdb'
        env:
          # 与 install_gaussdb_driver.sh 一致的官方驱动包地址
          GAUSS_URL: https://dbs-download.obs.cn-north-1.myhuaweicloud.com/GaussDB/1730887196055/GaussDB_driver.zip
          GAUSS_ARCH: ${{ matrix.gauss_arch }}   # X86_64 或 arm_64
        run: |
          set -eux
          rm -rf gaussdb_dl gaussdb_extract libpq
          mkdir -p gaussdb_dl gaussdb_extract libpq/include libpq/lib
          wget -q -O GaussDB_driver.zip "$GAUSS_URL"
          unzip -q GaussDB_driver.zip -d gaussdb_dl
          KDIR="gaussdb_dl/GaussDB_driver/Centralized/Kylinv10_${GAUSS_ARCH}"
          test -d "$KDIR" || { echo "未找到 Kylin 驱动目录: $KDIR"; ls -R gaussdb_dl/GaussDB_driver/Centralized | head -50; exit 1; }
          # 解压该 Kylin 目录下所有 tar.gz(含 libpq 与头文件), 再按内容装配 libpq/
          for tb in "$KDIR"/*.tar.gz; do
            tar --no-same-owner -xzf "$tb" -C gaussdb_extract || true
          done
          # 拷贝 libpq.so* 及其同目录依赖库(*_gauss / ssl / crypto 等)
          LIBSRC="$(dirname "$(find gaussdb_extract -name 'libpq.so*' | head -n1)")"
          test -n "$LIBSRC" && cp -a "$LIBSRC"/*.so* libpq/lib/
          # 拷贝 libpq-fe.h 所在目录的全部头文件(含 gs_thread.h / postgres_ext.h / libpq/ 子目录)
          HDR="$(find gaussdb_extract -name 'libpq-fe.h' | head -n1)"
          test -n "$HDR" && cp -a "$(dirname "$HDR")"/* libpq/include/
          test -f libpq/include/libpq-fe.h
          ls libpq/lib/libpq.so*
          # GaussDB(Kylin V10) 的 libpq 链接 OpenSSL 1.1(libpq.so 的 NEEDED 为
          # libssl.so.1.1 / libcrypto.so.1.1), 但驱动包内只带无版本名的
          # libssl.so / libcrypto.so, 版本化实体依赖 OS 提供。manylinux_2_28
          # (AlmaLinux 8) 自带 OpenSSL 1.1.1, 把版本化实体放进 libpq/lib,
          # 让 build 脚本的依赖闭包 bundler 一并打包 —— 否则产物在不带
          # OpenSSL 1.1 的系统(如 Ubuntu 22.04+/openssl3)上会 LOAD 失败:
          # "libssl.so.1.1: cannot open shared object file"。
          copy_openssl11() {
            local name="$1" stem="${1%%.so*}" d
            for d in /usr/lib64 /lib64 /usr/lib /usr/lib/x86_64-linux-gnu /usr/lib/aarch64-linux-gnu; do
              if [ -e "$d/$name" ]; then cp -Lf "$d/$name" "libpq/lib/$name"; return 0; fi
            done
            # 退回包内无版本名实体(若确为真实 ELF)
            if [ -e "libpq/lib/${stem}.so" ] && [ ! -L "libpq/lib/${stem}.so" ]; then
              cp -Lf "libpq/lib/${stem}.so" "libpq/lib/$name"; return 0
            fi
            return 1
          }
          copy_openssl11 libssl.so.1.1    || { echo "ERROR: 找不到 libssl.so.1.1 来源"; exit 1; }
          copy_openssl11 libcrypto.so.1.1 || { echo "ERROR: 找不到 libcrypto.so.1.1 来源"; exit 1; }
          ls -l libpq/lib/libssl.so.1.1 libpq/lib/libcrypto.so.1.1

      # -----------------------------------------------------------------------
      # 构建扩展 (复用仓库的 build_opengauss_scanner.sh, 官方 ninja 生成器)
      # -----------------------------------------------------------------------
      - name: Build extension
        env:
          # 版本戳: 让扩展元数据里的 DuckDB 版本 = 目标版本, 与官方预编译 CLI 精确匹配。
          # 不设则浅克隆无 tag 会回落成占位版本 v0.0.1, 导致在官方 DuckDB 上 LOAD 被拒。
          OVERRIDE_GIT_DESCRIBE: ${{ matrix.dv.version }}
        run: |
          set -eux
          chmod +x build_opengauss_scanner.sh
          ./build_opengauss_scanner.sh \
            --libpq-dir "$PWD/libpq" \
            --output    "$PWD/dist" \
            --ninja
          echo "---- 产物 ----"
          ls -R dist
          readelf -d dist/opengauss_scanner.duckdb_extension | grep -E 'RPATH|RUNPATH' || true

      # 不手动 zip: actions/upload-artifact 下载时本身会再打一层 zip。若这里先
      # zip 成同名文件再上传, 下载得到的会是"同名 zip 套同名 zip"(双重压缩)。
      # 直接上传 dist/ 目录内容, 让 GitHub 只压一层 —— 下载
      # opengauss_scanner-<variant>-<platform>.zip 解开即是 扩展本体 + lib/ + USAGE.md。
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: opengauss_scanner-${{ matrix.variant }}-${{ matrix.platform }}-${{ matrix.dv.version }}
          path: dist
          if-no-files-found: error

      # 冒烟测试需要一个版本完全匹配的 DuckDB CLI —— 直接用本次构建同时产出的那个,
      # 天然与扩展的 duckdb source id 一致。两个平台都产出, 供各自平台的 test 使用。
      - name: Stage matching DuckDB CLI
        run: |
          set -eux
          CLI="$(find duckdb-postgres/build/release -maxdepth 2 -name duckdb -type f | head -n1)"
          test -n "$CLI"
          cp "$CLI" duckdb

      - name: Upload DuckDB CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-cli-${{ matrix.variant }}-${{ matrix.platform }}-${{ matrix.dv.version }}
          path: duckdb
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 测试: 在 linux_amd64 与 linux_arm64 上用 openGauss docker 做加载 + 连接 + 查询
  # 冒烟测试(openGauss 官方镜像是 amd64/arm64 多架构, 各自 runner 自动拉对应架构)。
  # (GaussDB 版的扩展链接 GaussDB libpq, 同样以 sha256 连接 openGauss 服务端)
  # ---------------------------------------------------------------------------
  test:
    name: test-${{ matrix.dv.version }}-${{ matrix.variant }}-${{ matrix.platform }}
    needs: [prepare, build]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        dv: ${{ fromJSON(needs.prepare.outputs.matrix) }}
        variant: [opengauss, gaussdb]
        platform: [linux_amd64, linux_arm64]
        include:
          - platform: linux_amd64
            runner: ubuntu-latest
          - platform: linux_arm64
            runner: ubuntu-24.04-arm
    services:
      opengauss:
        image: opengauss/opengauss-server:latest
        env:
          GS_USERNAME: root
          GS_USER_PASSWORD: Passwd@123
          GS_PASSWORD: Passwd@123
        ports:
          - 5432:5432
        options: >-
          --privileged=true --name opengauss-custom
    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: opengauss_scanner-${{ matrix.variant }}-${{ matrix.platform }}-${{ matrix.dv.version }}
          path: dl

      - name: Download DuckDB CLI
        uses: actions/download-artifact@v4
        with:
          name: duckdb-cli-${{ matrix.variant }}-${{ matrix.platform }}-${{ matrix.dv.version }}
          path: dl-cli

      - name: Unpack
        run: |
          set -eux
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
          # artifact 现在直接是 dist/ 目录内容(扩展本体 + lib/), 无内层 zip
          mkdir -p dist
          cp -a dl/. dist/
          cp dl-cli/duckdb ./duckdb
          chmod +x ./duckdb
          ls -R dist

      - name: Wait for openGauss
        run: |
          set -eu
          # opengauss docker 初始化期间会内部重启一次(先起库→改配置→重启),
          # pg_isready 可能在重启前的短暂窗口就误报 ready, 随后 CREATE DATABASE
          # 撞上重启会断连(FATAL: terminating connection due to administrator command)。
          # 这里改为在容器内用 gsql 真正执行查询, 且要求"连续 5 次"成功(每次间隔 3s),
          # 以确保已越过初始化重启、服务已稳定接受连接。
          ok=0
          for i in $(seq 1 60); do
            if docker exec opengauss-custom bash -c "su - omm -c 'gsql -d postgres -c \"SELECT 1;\"'" >/dev/null 2>&1; then
              ok=$((ok+1)); echo "gsql ok #$ok (attempt $i)"
              [ "$ok" -ge 5 ] && { echo "openGauss stable"; break; }
            else
              ok=0; echo "gsql not ready yet (attempt $i)"
            fi
            sleep 3
          done
          [ "$ok" -ge 5 ] || { echo "ERROR: openGauss 未在预期时间内稳定就绪"; exit 1; }

      - name: Create test database & data
        run: |
          set -euo pipefail
          # 注意: 用了 gsql | tee 管道, 必须 pipefail 才能让 if 拿到 gsql 的真实退出码
          #(否则退出码是 tee 的, 恒为 0, 重试会失效)。
          cat > setup.sql <<'SQL'
          CREATE TABLE IF NOT EXISTS t(id int, name text);
          INSERT INTO t VALUES (1,'a'),(2,'b'),(3,'c');
          GRANT USAGE ON SCHEMA public TO root;
          GRANT SELECT ON t TO root;
          SQL
          docker cp setup.sql opengauss-custom:/tmp/setup.sql
          # 即便已尽量等待稳定, 仍对建库/建表整体加重试, 容忍偶发瞬时断连。
          # CREATE DATABASE IF NOT EXISTS 保证重试幂等; setup.sql 内部已用 IF NOT EXISTS。
          for i in $(seq 1 10); do
            if docker exec opengauss-custom bash -c "su - omm -c 'gsql -d postgres -c \"CREATE DATABASE test;\"'" 2>&1 | tee /tmp/cdb.log \
               && docker exec opengauss-custom bash -c "su - omm -c 'gsql -d test -f /tmp/setup.sql'" 2>&1 | tee /tmp/setup.log; then
              echo "db setup ok (attempt $i)"; break
            fi
            # 数据库已存在视为成功(重试导致的幂等结果)
            if grep -q 'already exists' /tmp/cdb.log; then
              docker exec opengauss-custom bash -c "su - omm -c 'gsql -d test -f /tmp/setup.sql'" && { echo "db exists, setup ok (attempt $i)"; break; }
            fi
            echo "db setup failed, retry $i ..."; sleep 5
            [ "$i" -eq 10 ] && { echo "ERROR: 建库/建表在多次重试后仍失败"; exit 1; }
          done

      - name: Smoke test (LOAD + ATTACH + query)
        run: |
          set -eux
          EXT="$PWD/dist/opengauss_scanner.duckdb_extension"
          test -f "$EXT"
          ./duckdb -unsigned -c "
            LOAD '${EXT}';
            ATTACH 'host=127.0.0.1 port=5432 dbname=test user=root password=Passwd@123' AS og (TYPE opengauss);
            SELECT 'ROWS=' || count(*) AS r FROM og.public.t;
          " | tee out.txt
          grep -q 'ROWS=3' out.txt

  # ---------------------------------------------------------------------------
  # 发布: 打 v* tag 时, 把 4 个压缩包挂到 GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: release
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: opengauss_scanner-*
          path: artifacts

      # 每个 artifact 下载为一个目录(artifacts/opengauss_scanner-<v>-<p>/, 内含
      # 扩展本体 + lib/)。这里把每个目录打成"单层"zip 再挂到 Release, 保证用户
      # 下载解开即用, 不出现双重压缩。
      - name: Repack artifacts into release zips
        run: |
          set -eux
          mkdir -p release
          for d in artifacts/opengauss_scanner-*; do
            [ -d "$d" ] || continue
            name="$(basename "$d")"
            ( cd "$d" && zip -r "$GITHUB_WORKSPACE/release/${name}.zip" . )
          done
          ls -l release

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
